version: '3.8'

services:
  # 后端 API 服务
  backend:
    build: .
    container_name: ai-design-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./app.db:/app/app.db
    environment:
      - DEBUG=False
      # ---- SQLite 模式（默认）----
      - DB_TYPE=sqlite
      - DB_NAME=app
      # ---- MySQL RDS 模式（生产环境取消注释）----
      # - DB_TYPE=mysql
      # - DB_HOST=rm-xxxxx.mysql.rds.aliyuncs.com
      # - DB_PORT=3306
      # - DB_NAME=anti_pro_db
      # - DB_USER=anti_pro_user
      # - DB_PASSWORD=your_strong_password
      # - DB_POOL_SIZE=10
      # - DB_POOL_RECYCLE=1800
      # - DB_POOL_PRE_PING=True
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
